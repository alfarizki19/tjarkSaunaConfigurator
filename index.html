<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tjark - Sauna Configurator</title>
    <link rel="stylesheet" href="style/main.css">
</head>
<body>

    <div id="modelViewer">
        <div id="loading">Initialising 3D Assets...</div>
    </div>

    <div id="modelControllerArea">
        <h2>Sauna Configurator</h2>
        <hr>

        <div class="menu-tabs">
            <button class="tab-btn active" id="btn-scale">Size</button>
            <button class="tab-btn" id="btn-exterior">Exterior</button>
            <button class="tab-btn" id="btn-interior">Interior</button>
        </div>

        <div id="menuArea">
            <div id="scaleMenu" class="menu-content">
                <div class="control-box">
                    <p>Sauna Widht</p>
                    <input type="range" id="sliderX" min="1.0" max="1.5" step="0.01" value="1.0">
                    <div class="val-display" id="valX">2.00 m</div>
                </div>

                <div class="control-box">
                    <p>Sauna Depth</p>
                    <input type="range" id="sliderY" min="1.0" max="1.5" step="0.01" value="1.0">
                    <div class="val-display" id="valY">2.00 m</div>
                </div>
            </div>

            <div id="exteriorMenu" class="menu-content" style="display: none;">
                <p class="menu-label">Select Exterior Variant</p>
                <div class="texture-grid">
                    <button class="tex-btn" id="ext_A">Exterior A</button>
                    <button class="tex-btn" id="ext_B">Exterior B</button>
                    <button class="tex-btn" id="ext_C">Exterior C</button>
                </div>
            </div>

            <div id="interiorMenu" class="menu-content" style="display: none;">
                <p class="menu-label">Select Interior Variant</p>
                <div class="texture-grid">
                    <button class="tex-btn" id="int_A">Interior A</button>
                    <button class="tex-btn" id="int_B">Interior B</button>
                    <button class="tex-btn" id="int_C">Interior C</button>
                </div>
            </div>
        </div>
    </div>

    <script type="importmap">
    {
        "imports": {
            "three": "https://esm.sh/three@0.160.0",
            "three/addons/": "https://esm.sh/three@0.160.0/examples/jsm/"
        }
    }
    </script>

    <script type="module" src="js/loadModel.js"></script>

</body>
</html>
